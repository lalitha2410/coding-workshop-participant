[pytest]
# Shared config for every service suite. Because each service is run from its own
# directory (their modules share names like function.py and can't co-exist in one
# process), pytest discovers this file as the nearest ancestor config — so the
# marker registry below applies uniformly to all five services.
addopts = --strict-markers
markers =
    unit: pure logic, no database (validation, helpers, parsing)
    integration: real database round-trips through the repository layer
    api: handler routing, status codes, request/response shaping (repo mocked)
    security: authentication, RBAC/permissions, injection, token handling
    performance: response-time and load benchmarks (opt-in; DB-backed, slower)
